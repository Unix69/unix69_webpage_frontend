<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytic Reporter Web Server</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Analytic Reporter Login</h1>
        <form id="loginForm" action="/login" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" title="Enter the username" required>
            </div>
            <br>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" title="Enter the password" required>
            </div>
            <br>
            <button type="submit" class="btn btn-dark" id="loginBtn">Login</button>
        </form>
        <br>
        <span id="loginErrorPanelSpan" style="color: red;"> {{ errorMessage }} </span>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap/dist/js/bootstrap.min.js"></script>

     <script type="text/javascript">
        $('#loginForm').submit(function() {
          $('#loginErrorPanelSpan').text("");
          return true;
        });
    </script>

</body>
</html>
